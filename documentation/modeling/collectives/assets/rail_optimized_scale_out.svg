<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="Helvetica, Arial, sans-serif">
  <!-- Title -->
  <text x="540" y="28" text-anchor="middle" font-size="18" font-weight="bold">
    Rail-optimized scale-out (2 racks × 4 GPUs, 4 rails)
  </text>
  <text x="540" y="48" text-anchor="middle" font-size="12" fill="#555">
    Each GPU's NIC lands on its own rail; "GPU i" across all racks shares Rail i ToR — DP all-reduce stays on one rail
  </text>

  <!-- ============ Scale-out fabric enclosure ============ -->
  <rect x="50" y="70" width="1015" height="200" rx="8" fill="none" stroke="#d68910" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="62" y="60" width="138" height="20" fill="white"/>
  <text x="70" y="75" font-size="12" font-weight="bold" fill="#7e5109" font-style="italic">Scale-out fabric</text>

  <!-- ============ Rail ToRs ============ -->
  <g>
    <rect x="60" y="80" width="170" height="46" fill="#fef5e7" stroke="#d68910" stroke-width="2.5"/>
    <text x="145" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#7e5109">Rail 0 ToR</text>
    <text x="145" y="119" text-anchor="middle" font-size="11" fill="#7e5109">RoCE / IB</text>
  </g>
  <g>
    <rect x="335" y="80" width="170" height="46" fill="#fdedec" stroke="#c0392b" stroke-width="2.5"/>
    <text x="420" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b241c">Rail 1 ToR</text>
    <text x="420" y="119" text-anchor="middle" font-size="11" fill="#7b241c">RoCE / IB</text>
  </g>
  <g>
    <rect x="610" y="80" width="170" height="46" fill="#f4ecf7" stroke="#884ea0" stroke-width="2.5"/>
    <text x="695" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b2c6f">Rail 2 ToR</text>
    <text x="695" y="119" text-anchor="middle" font-size="11" fill="#5b2c6f">RoCE / IB</text>
  </g>
  <g>
    <rect x="885" y="80" width="170" height="46" fill="#e8f6f3" stroke="#138d75" stroke-width="2.5"/>
    <text x="970" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">Rail 3 ToR</text>
    <text x="970" y="119" text-anchor="middle" font-size="11" fill="#0e6655">RoCE / IB</text>
  </g>

  <!-- ============ Rack outlines ============ -->
  <rect x="30" y="180" width="490" height="290" rx="8" fill="none" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="42" y="190" width="80" height="20" fill="white"/>
  <text x="50" y="205" font-size="13" font-weight="bold" fill="#444">Rack A</text>

  <rect x="560" y="180" width="490" height="290" rx="8" fill="none" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="572" y="190" width="80" height="20" fill="white"/>
  <text x="580" y="205" font-size="13" font-weight="bold" fill="#444">Rack B</text>

  <!-- ============ Rack A internals ============ -->

  <!-- NICs (Server A) -->
  <rect x="65" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="100" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 0</text>
  <rect x="180" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="215" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 1</text>
  <rect x="295" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="330" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 2</text>
  <rect x="410" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="445" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 3</text>

  <!-- GPUs (Server A) -->
  <rect x="65" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="100" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 0</text>
  <rect x="180" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="215" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 1</text>
  <rect x="295" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="330" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 2</text>
  <rect x="410" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="445" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 3</text>

  <!-- PCIe links (Server A) -->
  <line x1="100" y1="256" x2="100" y2="290" stroke="#566573" stroke-width="1.5"/>
  <line x1="215" y1="256" x2="215" y2="290" stroke="#566573" stroke-width="1.5"/>
  <line x1="330" y1="256" x2="330" y2="290" stroke="#566573" stroke-width="1.5"/>
  <line x1="445" y1="256" x2="445" y2="290" stroke="#566573" stroke-width="1.5"/>

  <!-- Scale-up switch (Rack A) -->
  <rect x="50" y="395" width="450" height="50" rx="6" fill="#aed6f1" stroke="#1f618d" stroke-width="2"/>
  <text x="275" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">Scale-up switch</text>
  <text x="275" y="436" text-anchor="middle" font-size="11" fill="#1a5276" font-style="italic">(NVSwitch-class, full crossbar across rack's GPUs)</text>

  <!-- Scale-up links (Rack A): two rails per GPU -->
  <line x1="92" y1="346" x2="92" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="108" y1="346" x2="108" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="207" y1="346" x2="207" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="223" y1="346" x2="223" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="322" y1="346" x2="322" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="338" y1="346" x2="338" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="437" y1="346" x2="437" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="453" y1="346" x2="453" y2="395" stroke="#2874a6" stroke-width="2.5"/>

  <!-- ============ Rack B internals (mirror) ============ -->

  <!-- NICs (Server B) -->
  <rect x="595" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="630" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 0</text>
  <rect x="710" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="745" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 1</text>
  <rect x="825" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="860" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 2</text>
  <rect x="940" y="220" width="70" height="36" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
  <text x="975" y="243" text-anchor="middle" font-size="11" font-weight="bold">NIC 3</text>

  <!-- GPUs (Server B) -->
  <rect x="595" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="630" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 0</text>
  <rect x="710" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="745" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 1</text>
  <rect x="825" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="860" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 2</text>
  <rect x="940" y="290" width="70" height="56" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
  <text x="975" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">GPU 3</text>

  <!-- PCIe links (Server B) -->
  <line x1="630" y1="256" x2="630" y2="290" stroke="#566573" stroke-width="1.5"/>
  <line x1="745" y1="256" x2="745" y2="290" stroke="#566573" stroke-width="1.5"/>
  <line x1="860" y1="256" x2="860" y2="290" stroke="#566573" stroke-width="1.5"/>
  <line x1="975" y1="256" x2="975" y2="290" stroke="#566573" stroke-width="1.5"/>

  <!-- Scale-up switch (Rack B) -->
  <rect x="580" y="395" width="450" height="50" rx="6" fill="#aed6f1" stroke="#1f618d" stroke-width="2"/>
  <text x="805" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">Scale-up switch</text>
  <text x="805" y="436" text-anchor="middle" font-size="11" fill="#1a5276" font-style="italic">(NVSwitch-class, full crossbar across rack's GPUs)</text>

  <!-- Scale-up links (Rack B) -->
  <line x1="622" y1="346" x2="622" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="638" y1="346" x2="638" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="737" y1="346" x2="737" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="753" y1="346" x2="753" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="852" y1="346" x2="852" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="868" y1="346" x2="868" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="967" y1="346" x2="967" y2="395" stroke="#2874a6" stroke-width="2.5"/>
  <line x1="983" y1="346" x2="983" y2="395" stroke="#2874a6" stroke-width="2.5"/>

  <!-- ============ Rail wiring (NIC ↔ Rail ToR) ============ -->
  <!-- Rail 0 (amber) -->
  <line x1="100" y1="220" x2="145" y2="126" stroke="#d68910" stroke-width="2.2"/>
  <line x1="630" y1="220" x2="145" y2="126" stroke="#d68910" stroke-width="2.2"/>

  <!-- Rail 1 (red) -->
  <line x1="215" y1="220" x2="420" y2="126" stroke="#c0392b" stroke-width="2.2"/>
  <line x1="745" y1="220" x2="420" y2="126" stroke="#c0392b" stroke-width="2.2"/>

  <!-- Rail 2 (purple) -->
  <line x1="330" y1="220" x2="695" y2="126" stroke="#884ea0" stroke-width="2.2"/>
  <line x1="860" y1="220" x2="695" y2="126" stroke="#884ea0" stroke-width="2.2"/>

  <!-- Rail 3 (teal) -->
  <line x1="445" y1="220" x2="970" y2="126" stroke="#138d75" stroke-width="2.2"/>
  <line x1="975" y1="220" x2="970" y2="126" stroke="#138d75" stroke-width="2.2"/>

  <!-- ============ Caption ============ -->
  <g transform="translate(40, 495)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#222">Why rail-optimized?</text>
    <text x="0" y="20" font-size="11" fill="#444">
      • Cross-rack "GPU i ↔ GPU i" all-reduce stays on Rail i — single ToR hop, no spine.
    </text>
    <text x="0" y="38" font-size="11" fill="#444">
      • Cross-rail traffic (e.g., GPU 0 → GPU 1) goes through the local scale-up switch; only
      cross-rack cross-rail pays the spine.
    </text>
    <text x="0" y="56" font-size="11" fill="#444">
      • Aligning DP groups with rails maps the largest collective onto the cheapest path.
    </text>
  </g>

  <!-- ============ Legend ============ -->
  <g transform="translate(680, 495)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#222">Legend</text>

    <line x1="0" y1="22" x2="30" y2="22" stroke="#2874a6" stroke-width="3"/>
    <text x="38" y="26" font-size="11">scale-up (NVLink)</text>

    <line x1="170" y1="22" x2="200" y2="22" stroke="#566573" stroke-width="2"/>
    <text x="208" y="26" font-size="11">PCIe</text>

    <line x1="0" y1="44" x2="30" y2="44" stroke="#d68910" stroke-width="2.2"/>
    <text x="38" y="48" font-size="11">Rail 0</text>

    <line x1="100" y1="44" x2="130" y2="44" stroke="#c0392b" stroke-width="2.2"/>
    <text x="138" y="48" font-size="11">Rail 1</text>

    <line x1="200" y1="44" x2="230" y2="44" stroke="#884ea0" stroke-width="2.2"/>
    <text x="238" y="48" font-size="11">Rail 2</text>

    <line x1="300" y1="44" x2="330" y2="44" stroke="#138d75" stroke-width="2.2"/>
    <text x="338" y="48" font-size="11">Rail 3</text>
  </g>
</svg>
