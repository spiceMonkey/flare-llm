<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a1929" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="userSpaceOnUse"
            markerWidth="13" markerHeight="13" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1929"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="50" font-weight="700" fill="#f1f5f9"
        letter-spacing="-1">
    Collective Communication Cost Modeling
  </text>

  <!-- Subtitle -->
  <text x="600" y="140" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#94a3b8">
    A first-principles tutorial &amp; toolkit
  </text>

  <!-- Ring diagram, centered at (600, 365) -->
  <g transform="translate(600 365)">

    <!-- Arrows: canonical n0 -> n1 line, rotated 0/45/.../315 deg around (0,0) -->
    <g stroke="#cbd5e1" stroke-width="2.5" fill="none"
       marker-end="url(#arrow)" opacity="0.75">
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(45)"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(90)"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(135)"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(180)"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(225)"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(270)"/>
      <line x1="27.72" y1="-118.52" x2="64.20" y2="-103.40" transform="rotate(315)"/>
    </g>

    <!-- Outer node rings -->
    <g fill="#1e293b" stroke="#cbd5e1" stroke-width="2.5">
      <circle cx="0"      cy="-130"   r="28"/>
      <circle cx="91.92"  cy="-91.92" r="28"/>
      <circle cx="130"    cy="0"      r="28"/>
      <circle cx="91.92"  cy="91.92"  r="28"/>
      <circle cx="0"      cy="130"    r="28"/>
      <circle cx="-91.92" cy="91.92"  r="28"/>
      <circle cx="-130"   cy="0"      r="28"/>
      <circle cx="-91.92" cy="-91.92" r="28"/>
    </g>

    <!-- Inner data chunks (rainbow, suggesting 8 distinct data shards) -->
    <circle cx="0"      cy="-130"   r="11" fill="#ef4444"/>
    <circle cx="91.92"  cy="-91.92" r="11" fill="#f97316"/>
    <circle cx="130"    cy="0"      r="11" fill="#eab308"/>
    <circle cx="91.92"  cy="91.92"  r="11" fill="#84cc16"/>
    <circle cx="0"      cy="130"    r="11" fill="#22c55e"/>
    <circle cx="-91.92" cy="91.92"  r="11" fill="#06b6d4"/>
    <circle cx="-130"   cy="0"      r="11" fill="#3b82f6"/>
    <circle cx="-91.92" cy="-91.92" r="11" fill="#a855f7"/>
  </g>

  <!-- Caption -->
  <text x="600" y="552" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="18" font-style="italic" fill="#64748b">
    Ring all-reduce — 8 nodes, chunks rotating
  </text>

  <!-- URL footer -->
  <text x="600" y="598" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" fill="#94a3b8">
    github.com/spiceMonkey/collective-comm
  </text>
</svg>
