<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="Helvetica, Arial, sans-serif">
  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="bold">
    Scale-up + scale-out network for a 4-GPU server
  </text>
  <text x="410" y="48" text-anchor="middle" font-size="12" fill="#555">
    Each GPU has two distinct network paths — high-BW scale-up below, PCIe → NIC → ToR scale-out above
  </text>

  <!-- ============ Scale-out side ============ -->

  <!-- Scale-out fabric enclosure -->
  <rect x="80" y="58" width="620" height="232" rx="8" fill="none" stroke="#d68910" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="92" y="48" width="138" height="20" fill="white"/>
  <text x="100" y="63" font-size="12" font-weight="bold" fill="#7e5109" font-style="italic">Scale-out fabric</text>

  <!-- Spine fabric -->
  <rect x="260" y="70" width="300" height="36" rx="18" fill="#fef5e7" stroke="#d68910" stroke-width="2"/>
  <text x="410" y="93" text-anchor="middle" font-size="13" font-style="italic" fill="#7e5109">
    scale-out spine (cross-rack fabric)
  </text>

  <!-- ToR switch -->
  <rect x="240" y="150" width="340" height="44" fill="#fad7a0" stroke="#d68910" stroke-width="2"/>
  <text x="410" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e5109">
    ToR switch (RoCE / InfiniBand)
  </text>

  <!-- Spine ↔ ToR -->
  <line x1="380" y1="106" x2="380" y2="150" stroke="#d68910" stroke-width="2"/>
  <line x1="440" y1="106" x2="440" y2="150" stroke="#d68910" stroke-width="2"/>

  <!-- NICs -->
  <g>
    <rect x="120" y="240" width="80" height="40" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
    <text x="160" y="265" text-anchor="middle" font-size="12" font-weight="bold">NIC 0</text>
  </g>
  <g>
    <rect x="280" y="240" width="80" height="40" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
    <text x="320" y="265" text-anchor="middle" font-size="12" font-weight="bold">NIC 1</text>
  </g>
  <g>
    <rect x="440" y="240" width="80" height="40" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
    <text x="480" y="265" text-anchor="middle" font-size="12" font-weight="bold">NIC 2</text>
  </g>
  <g>
    <rect x="600" y="240" width="80" height="40" fill="#eaecee" stroke="#566573" stroke-width="1.5"/>
    <text x="640" y="265" text-anchor="middle" font-size="12" font-weight="bold">NIC 3</text>
  </g>

  <!-- ToR ↔ NIC links -->
  <line x1="160" y1="240" x2="290" y2="194" stroke="#d68910" stroke-width="2"/>
  <line x1="320" y1="240" x2="370" y2="194" stroke="#d68910" stroke-width="2"/>
  <line x1="480" y1="240" x2="450" y2="194" stroke="#d68910" stroke-width="2"/>
  <line x1="640" y1="240" x2="530" y2="194" stroke="#d68910" stroke-width="2"/>

  <!-- Side annotation: scale-out -->
  <text x="710" y="258" font-size="11" fill="#7e5109" font-style="italic">scale-out</text>
  <text x="710" y="273" font-size="11" fill="#7e5109" font-style="italic">~50–100 GB/s</text>

  <!-- ============ GPU row ============ -->

  <g>
    <rect x="120" y="340" width="80" height="60" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
    <text x="160" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e6655">GPU 0</text>
  </g>
  <g>
    <rect x="280" y="340" width="80" height="60" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
    <text x="320" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e6655">GPU 1</text>
  </g>
  <g>
    <rect x="440" y="340" width="80" height="60" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
    <text x="480" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e6655">GPU 2</text>
  </g>
  <g>
    <rect x="600" y="340" width="80" height="60" rx="4" fill="#abebc6" stroke="#1e8449" stroke-width="2"/>
    <text x="640" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e6655">GPU 3</text>
  </g>

  <!-- PCIe links (NIC ↔ GPU) -->
  <line x1="160" y1="280" x2="160" y2="340" stroke="#566573" stroke-width="2"/>
  <line x1="320" y1="280" x2="320" y2="340" stroke="#566573" stroke-width="2"/>
  <line x1="480" y1="280" x2="480" y2="340" stroke="#566573" stroke-width="2"/>
  <line x1="640" y1="280" x2="640" y2="340" stroke="#566573" stroke-width="2"/>

  <text x="710" y="306" font-size="11" fill="#566573" font-style="italic">PCIe Gen5/6</text>
  <text x="710" y="321" font-size="11" fill="#566573" font-style="italic">~50–100 GB/s</text>

  <!-- ============ Scale-up switch ============ -->

  <!-- Scale-up links (two rails per GPU for visual emphasis) -->
  <line x1="148" y1="400" x2="148" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="172" y1="400" x2="172" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="308" y1="400" x2="308" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="332" y1="400" x2="332" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="468" y1="400" x2="468" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="492" y1="400" x2="492" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="628" y1="400" x2="628" y2="470" stroke="#2874a6" stroke-width="3"/>
  <line x1="652" y1="400" x2="652" y2="470" stroke="#2874a6" stroke-width="3"/>

  <rect x="100" y="470" width="600" height="60" rx="6" fill="#aed6f1" stroke="#1f618d" stroke-width="2.5"/>
  <text x="400" y="498" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a5276">
    Scale-up switch (NVSwitch-class)
  </text>
  <text x="400" y="518" text-anchor="middle" font-size="11" fill="#1a5276" font-style="italic">
    full-bandwidth crossbar across all GPUs in the scale-up domain
  </text>

  <text x="710" y="430" font-size="11" fill="#1a5276" font-style="italic">scale-up</text>
  <text x="710" y="445" font-size="11" fill="#1a5276" font-style="italic">(NVLink)</text>
  <text x="710" y="460" font-size="11" fill="#1a5276" font-style="italic">~900 GB/s</text>

  <!-- ============ Legend ============ -->
  <g transform="translate(60, 575)">
    <line x1="0" y1="0" x2="36" y2="0" stroke="#2874a6" stroke-width="3"/>
    <text x="44" y="4" font-size="11">scale-up link (NVLink-class, high-BW)</text>

    <line x1="270" y1="0" x2="306" y2="0" stroke="#566573" stroke-width="2"/>
    <text x="314" y="4" font-size="11">PCIe Gen5/6 (GPU ↔ NIC)</text>

    <line x1="500" y1="0" x2="536" y2="0" stroke="#d68910" stroke-width="2"/>
    <text x="544" y="4" font-size="11">scale-out (RoCE / InfiniBand)</text>
  </g>
</svg>
